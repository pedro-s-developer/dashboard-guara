<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard · Performance</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F7F8FA;--w:#FFF;--b:#D8DEE9;--bs:#EEF1F6;--t:#0F1724;--t2:#2D3A4E;--t3:#56657A;--t4:#8899AA;--blue:#1877F2;--blu:#EAF1FF;--grn:#00934a;--grb:#E6F5EE;--ylw:#E08C00;--ylb:#FFF6E0;--tel:#0077A8;--tlb:#E0F4FA;--pur:#7B2FBE;--pub:#F3EAFF;}
body{background:var(--bg);color:var(--t);font-family:'Poppins',sans-serif;padding:16px 14px}
.pg{max-width:1180px;margin:0 auto}
/* Action bar */
.act-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.act-btn{font-family:'Poppins',sans-serif;font-size:11px;font-weight:700;padding:7px 14px;border-radius:8px;border:1.5px solid var(--b);background:var(--w);color:var(--t2);cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.act-btn.pri{background:var(--t);border-color:var(--t);color:#fff}
.drop{position:relative;display:inline-block}
.drop-menu{display:none;position:absolute;top:calc(100% + 4px);left:0;background:var(--w);border:1.5px solid var(--b);border-radius:8px;min-width:160px;box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:100;overflow:hidden}
.drop-menu.on{display:block}
.drop-item{display:flex;align-items:center;gap:8px;padding:10px 14px;font-size:11px;font-weight:600;color:var(--t2);cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:'Poppins',sans-serif;white-space:nowrap}
.drop-item:hover{background:var(--bs)}
/* Range picker */
.cal-drop{margin-left:auto}
.cal-menu{padding:0;right:0;left:auto;overflow:visible;width:min(680px,calc(100vw - 40px))}
.cal-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--bs)}
.cal-hdr-label{font-size:12px;font-weight:800;color:var(--t)}
.cal-hdr-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--t3);padding:0 4px;line-height:1}
.cal-body{display:grid;grid-template-columns:150px 1fr;min-height:280px}
.cal-presets{border-right:1px solid var(--bs);padding:8px 0}
.cal-preset{display:block;width:100%;padding:9px 16px;font-size:11px;font-weight:600;color:var(--t2);border:none;background:none;text-align:left;cursor:pointer;font-family:'Poppins',sans-serif}
.cal-preset:hover{background:var(--bs)}
.cal-preset.on{background:var(--blu);color:var(--blue);font-weight:800}
.cal-months{padding:14px 16px}
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px}
.cal-nav-btn{background:none;border:1px solid var(--b);width:24px;height:24px;border-radius:6px;font-size:14px;cursor:pointer;color:var(--t2);display:flex;align-items:center;justify-content:center;padding:0;line-height:1}
.cal-nav-btn:hover{background:var(--bs)}
.cal-nav-btn:disabled{opacity:.3;cursor:not-allowed}
.cal-month-lbl{flex:1;text-align:center;font-size:11px;font-weight:800;color:var(--t);text-transform:uppercase;letter-spacing:.5px}
.cal-grids{display:grid;grid-template-columns:1fr;gap:14px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.cal-dow{font-size:8px;font-weight:700;color:var(--t4);padding:3px 0;text-transform:uppercase;text-align:center}
.cal-day{font-size:10px;font-weight:600;padding:6px 0;text-align:center;cursor:default;color:var(--t3);border-radius:0}
.cal-day.has-data{color:var(--t);cursor:pointer}
.cal-day.has-data:hover{background:var(--bs)}
.cal-day.in-range{background:var(--blu);color:var(--blue)}
.cal-day.range-start,.cal-day.range-end{background:var(--blue);color:#fff;font-weight:800}
.cal-day.range-start{border-radius:4px 0 0 4px}
.cal-day.range-end{border-radius:0 4px 4px 0}
.cal-day.range-start.range-end{border-radius:4px}
.cal-day.other-month{opacity:.25}
.cal-day.no-data{color:var(--t4);opacity:.4}
.cal-footer{display:flex;justify-content:flex-end;gap:8px;padding:10px 14px;border-top:1px solid var(--bs)}
.cal-footer .act-btn{font-size:11px;padding:6px 14px}
/* View toggle */
.view-rep{display:none}.view-rep.on{display:block}
/* Dashboard */
.hdr{padding-bottom:12px;border-bottom:1px solid var(--b);margin-bottom:14px}
.ey{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:1.5px;color:var(--t4)}
.ey b{color:#1877F2}
h1{font-size:22px;font-weight:900;letter-spacing:-.5px;line-height:1;margin:5px 0 3px}
.hm{font-size:10px;color:var(--t3);font-family:'IBM Plex Mono',monospace}
.hbadge{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;border:1px solid rgba(15,23,36,.15);background:var(--w);border-radius:6px;padding:5px 10px;margin-top:8px}
.sec{display:flex;align-items:center;gap:10px;padding-top:6px;margin:14px 0 10px}
.sec span{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:2px;white-space:nowrap}
.sec hr{flex:1;height:1px;background:var(--b);border:none}
.insight{background:linear-gradient(135deg,#0F1724,#1A2438 50%,#0F1724);border-radius:14px;padding:20px;margin-bottom:14px;color:#fff}
.ins-ey{font-size:9px;font-weight:900;letter-spacing:1.5px;color:rgba(255,255,255,.6);text-transform:uppercase;margin-bottom:10px}
.ins-t{font-size:14px;font-weight:600;line-height:1.5;margin-bottom:12px}
.ins-hl{color:#FFD166}
.ins-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.1)}
.is-label{font-size:8px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.is-val{font-weight:900;font-family:'IBM Plex Mono',monospace;font-size:13px}
.kpi-g{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kpi{background:var(--w);border:1px solid var(--b);border-radius:12px;padding:14px}
.kpi-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t4);margin-bottom:8px}
.kpi-v{font-size:22px;font-weight:900;line-height:1;letter-spacing:-.5px;margin-bottom:4px}
.kpi-s{font-size:10px;color:var(--t3)}
.gc{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:14px}
.gc-card{background:var(--w);border:1px solid var(--b);border-radius:12px;padding:14px 16px;position:relative;overflow:hidden}
.gc-bar{position:absolute;top:0;left:0;right:0;height:3px}
.gc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.gc-title{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:1px}
.gc-invest{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;border:1px solid var(--b);border-radius:5px;padding:3px 7px}
.gc-main{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.gc-num{font-size:26px;font-weight:900;line-height:1;margin-bottom:2px}
.gc-num-l{font-size:9px;color:var(--t3)}
.gc-cpr{font-size:18px;font-weight:900;color:var(--ylw);margin-bottom:2px}
.gc-cpr-l{font-size:9px;color:var(--t3)}
.gc-row{display:grid;grid-template-columns:repeat(3,1fr);padding-top:10px;border-top:1px solid var(--bs);gap:6px}
.gc-sv{font-size:11px;font-weight:900;font-family:'IBM Plex Mono',monospace}
.gc-sl{font-size:8px;color:var(--t3);margin-top:2px}
.pie-wrap{background:var(--w);border:1px solid var(--b);border-radius:12px;padding:16px;margin-bottom:14px}
.pie-title{font-size:13px;font-weight:800;margin-bottom:2px}
.pie-sub{font-size:10px;color:var(--t3);margin-bottom:12px}
.pie-lg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px;text-align:center}
.pl-lbl{font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.pl-v{font-size:11px;font-weight:900;font-family:'IBM Plex Mono',monospace}
.pl-p{font-size:9px;color:var(--t4);font-family:'IBM Plex Mono',monospace}
.tl{display:flex;background:var(--w);border:1px solid var(--b);padding:3px;border-radius:10px;gap:2px;margin-bottom:12px;overflow-x:auto}
.tb{flex:1;min-width:fit-content;font-family:'Poppins',sans-serif;font-size:11px;font-weight:700;padding:7px 10px;border-radius:7px;border:none;background:transparent;color:var(--t2);cursor:pointer;white-space:nowrap}
.tb.on{background:var(--blue);color:#fff}
.tc{display:none}.tc.on{display:block}
.cg-sect{margin-bottom:14px}
.cg-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.badge{font-size:9px;font-weight:900;letter-spacing:1px;padding:3px 8px;border-radius:5px;text-transform:uppercase}
.badge.topo{background:var(--ylb);color:var(--ylw)}.badge.meio{background:var(--tlb);color:var(--tel)}.badge.msg{background:var(--pub);color:var(--pur)}.badge.ven{background:var(--blu);color:var(--blue)}
.cg-stitle{font-size:12px;font-weight:800}.cg-sub{font-size:9px;color:var(--t3);font-family:'IBM Plex Mono',monospace;margin-left:auto}
.cr{padding:10px 0;border-bottom:1px solid var(--bs)}.cr:last-child{border-bottom:none}
.cr-name{font-size:12px;font-weight:700;margin-bottom:4px}
.cr-bar{height:4px;background:var(--bs);border-radius:2px;overflow:hidden;margin:5px 0}
.cr-fill{height:100%;border-radius:2px}
.cr-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:5px}
.cs-lbl{font-size:8px;color:var(--t4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.cs-v{font-size:13px;font-weight:900;font-family:'IBM Plex Mono',monospace}
.dr{padding:9px 0;border-bottom:1px solid var(--bs)}.dr:last-child{border-bottom:none}
.dr-date{font-size:11px;font-weight:700;font-family:'IBM Plex Mono',monospace;margin-bottom:4px}
.dr-bar{height:4px;background:var(--bs);border-radius:2px;overflow:hidden;margin-bottom:5px}
.dr-fill{height:100%;border-radius:2px;background:var(--pur)}
.dr-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.ds-lbl{font-size:8px;color:var(--t4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.ds-v{font-size:11px;font-weight:900;font-family:'IBM Plex Mono',monospace}
.fn{background:var(--w);border:1px solid var(--b);border-radius:12px;padding:16px;margin-bottom:10px}
.fn-hdr{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--bs)}
.fn-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.fn-title{font-size:12px;font-weight:800}.fn-sub{font-size:10px;color:var(--t3);margin-top:2px}
.fn-s{display:flex;align-items:center;gap:8px;padding:9px 12px;border:1px solid var(--b);border-radius:8px;margin-bottom:5px}
.fn-sn{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1px}
.fn-so{font-size:8px;color:var(--t4)}
.fn-sv{font-size:16px;font-weight:900;font-family:'IBM Plex Mono',monospace;min-width:70px;text-align:right;flex-shrink:0}
.fn-rate{text-align:right;min-width:55px;flex-shrink:0}
.fn-rv{font-size:11px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.fn-rl{font-size:8px;color:var(--t4);text-transform:uppercase;letter-spacing:.5px}
.fn-ins{background:linear-gradient(135deg,#0F1724,#1A2438);border-radius:10px;padding:12px;color:#fff;margin-top:10px;font-size:12px;line-height:1.5}
.fi-hl{color:#FFD166;font-weight:700}
.ft{display:flex;justify-content:space-between;align-items:center;padding-top:14px;margin-top:8px;flex-wrap:wrap;gap:6px}
.ft span{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--t4);letter-spacing:1.5px;text-transform:uppercase}
/* Report view */
.rep{max-width:720px;margin:0 auto;padding:8px 0 40px}
.rep-ey{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:1.5px;color:var(--t4);margin-bottom:8px}
.rep h1{font-size:22px;font-weight:900;letter-spacing:-.5px;margin-bottom:4px}
.rep-info{font-size:10px;color:var(--t3);font-family:'IBM Plex Mono',monospace;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid var(--b)}
.rep h2{font-size:15px;font-weight:800;margin:28px 0 10px;padding-bottom:8px;border-bottom:1px solid var(--b);color:var(--t)}
.rep h3{font-size:12px;font-weight:700;margin:18px 0 8px;color:var(--blue)}
.rep p{font-size:13px;line-height:1.75;margin-bottom:10px;color:var(--t2)}
.rep ul,.rep ol{padding-left:20px;margin-bottom:10px}
.rep li{font-size:13px;line-height:1.75;color:var(--t2);margin-bottom:4px}
.rep strong{font-weight:700;color:var(--t)}
.rep table{width:100%;border-collapse:collapse;margin:12px 0;font-size:12px}
.rep th{font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t4);padding:7px 8px;border-bottom:2px solid var(--b);text-align:left;font-size:9px}
.rep td{padding:8px;border-bottom:1px solid var(--bs);color:var(--t2)}
.rep-pbar{display:flex;gap:8px;margin-top:28px;padding-top:16px;border-top:1px solid var(--b)}
@media(min-width:768px){
  body{padding:40px 32px}
  h1{font-size:30px}
  .hdr{display:flex;justify-content:space-between;align-items:flex-end}
  .ins-t{font-size:18px}
  .ins-stats{display:flex;gap:32px}
  .kpi-g{grid-template-columns:repeat(4,1fr);gap:12px}
  .kpi{padding:22px}.kpi-v{font-size:32px}
  .gc{grid-template-columns:1fr 1fr}
  .tl{display:inline-flex;padding:4px;border-radius:12px}
  .tb{font-size:12px;padding:8px 20px;border-radius:8px}
  .gc-num{font-size:36px}
  .pie-lg{grid-template-columns:repeat(4,1fr)}
  .fn-sv{font-size:20px;min-width:90px}
  .rep h1{font-size:28px}
  .rep h2{font-size:17px}
  .cal-grids{grid-template-columns:1fr 1fr}
  .cal-menu{width:680px}
}
@media print{
  .act-bar,.rep-pbar{display:none!important}
  #viewDash{display:none!important}
  .view-rep{display:block!important}
  body{background:#fff;padding:20px}
  .rep{max-width:100%}
}
</style>
</head>

// ─── Helpers de data ──────────────────────────────────
function iso(d){return d.toISOString().slice(0,10);}
function fromIso(s){return new Date(s+'T00:00:00');}
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
function diffDays(a,b){return Math.round((fromIso(b)-fromIso(a))/(1000*60*60*24));}
function fmtBRL(n,dec){dec=dec==null?2:dec;return 'R$ '+(n||0).toLocaleString('pt-BR',{minimumFractionDigits:dec,maximumFractionDigits:dec});}
function fmtNum(n){return Math.round(n||0).toLocaleString('pt-BR');}
function fmtPct(n){return ((n||0)*100).toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1})+'%';}

var MES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
var MES_S=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
var DOW=['S','T','Q','Q','S','S','D']; // Seg..Dom
var DOW_L=['Dom','Seg','Ter','Qua','Qui','Sex','Sab'];

function labelRange(inicio,fim){
  var a=fromIso(inicio),b=fromIso(fim);
  var da=a.getDate(),db=b.getDate();
  var ma=a.getMonth(),mb=b.getMonth();
  var ya=a.getFullYear(),yb=b.getFullYear();
  if(inicio===fim)return da+' de '+MES[ma].toLowerCase()+' de '+ya;
  if(ya===yb&&ma===mb)return da+'–'+db+' '+MES_S[ma]+' '+yb;
  if(ya===yb)return da+' '+MES_S[ma]+' – '+db+' '+MES_S[mb]+' '+yb;
  return da+' '+MES_S[ma]+' '+ya+' – '+db+' '+MES_S[mb]+' '+yb;
}
function labelDia(isoStr){
  var d=fromIso(isoStr);var dow=DOW_L[d.getDay()];
  var parts=isoStr.split('-');return dow+' '+parts[2]+'/'+parts[1];
}

// ─── Data source ──────────────────────────────────────
var _dataMap={}; // 'AAAA-MM-DD' -> tem dados?
var _minDate=null,_maxDate=null;
(function buildDataMap(){
  _D.campanhas.forEach(function(c){
    c.dias.forEach(function(d){
      _dataMap[d.data]=true;
      if(!_minDate||d.data<_minDate)_minDate=d.data;
      if(!_maxDate||d.data>_maxDate)_maxDate=d.data;
    });
  });
})();

// ─── Presets ──────────────────────────────────────────
var PRESETS=[
  {key:'today',label:'Hoje'},
  {key:'yesterday',label:'Ontem'},
  {key:'last_7d',label:'Últimos 7 dias'},
  {key:'last_14d',label:'Últimos 14 dias'},
  {key:'last_28d',label:'Últimos 28 dias'},
  {key:'this_month',label:'Este mês'},
  {key:'last_month',label:'Mês passado'},
  {key:'max',label:'Máximo'},
  {key:'custom',label:'Personalizado'}
];
function applyPreset(key){
  if(!_maxDate)return null;
  var end=fromIso(_maxDate),start=fromIso(_maxDate);
  var endD=end,startD=start;
  switch(key){
    case 'today': break;
    case 'yesterday': endD=addDays(end,-1); startD=endD; break;
    case 'last_7d': startD=addDays(end,-6); break;
    case 'last_14d': startD=addDays(end,-13); break;
    case 'last_28d': startD=addDays(end,-27); break;
    case 'this_month': startD=new Date(end.getFullYear(),end.getMonth(),1); break;
    case 'last_month':
      startD=new Date(end.getFullYear(),end.getMonth()-1,1);
      endD=new Date(end.getFullYear(),end.getMonth(),0);
      break;
    case 'max': startD=fromIso(_minDate); break;
    default: return null;
  }
  return {inicio:iso(startD),fim:iso(endD),preset:key};
}
function detectPreset(inicio,fim){
  for(var i=0;i<PRESETS.length;i++){
    var p=applyPreset(PRESETS[i].key);
    if(p&&p.inicio===inicio&&p.fim===fim)return PRESETS[i].key;
  }
  return 'custom';
}

// ─── Agregação ────────────────────────────────────────
function aggregateRange(inicio,fim){
  var funis={TOPO:[],MEIO:[],FUNDO_MSG:[],FUNDO_VEN:[]};
  _D.campanhas.forEach(function(c){
    var diasR=c.dias.filter(function(d){return d.data>=inicio&&d.data<=fim;});
    if(!diasR.length)return;
    var agg={name:c.name,spend:0,reach:0,impr:0,results:0,compras:0,receita:0};
    diasR.forEach(function(d){
      agg.spend+=d.spend||0; agg.reach+=d.reach||0; agg.impr+=d.impr||0;
      agg.results+=d.results||0; agg.compras+=d.compras||0; agg.receita+=d.receita||0;
    });
    if(funis[c.funil])funis[c.funil].push(agg);
  });
  var byDate={};
  _D.campanhas.forEach(function(c){
    c.dias.filter(function(d){return d.data>=inicio&&d.data<=fim;}).forEach(function(d){
      if(!byDate[d.data])byDate[d.data]={data:d.data,spend:0,conversas:0,compras:0,receita:0};
      byDate[d.data].spend+=d.spend||0;
      byDate[d.data].compras+=d.compras||0;
      byDate[d.data].receita+=d.receita||0;
      if(c.funil==='FUNDO_MSG')byDate[d.data].conversas+=d.results||0;
    });
  });
  var daily=Object.keys(byDate).sort().map(function(k){
    var r=byDate[k];return {label:labelDia(r.data),invest:r.spend,conversas:r.conversas,compras:r.compras,receita:r.receita};
  });
  return {funis:funis,daily:daily};
}

// ─── Renderização ─────────────────────────────────────
function renderRange(inicio,fim){
  var presetKey=detectPreset(inicio,fim);
  var label=labelRange(inicio,fim);
  _currentRange={inicio:inicio,fim:fim,label:label,preset:presetKey};
  document.getElementById('d-per').textContent=label;
  document.getElementById('calLabel').textContent=label;
  document.getElementById('ft-l').textContent=label+' · Atualizado em '+_D.meta.updated;

  var agg=aggregateRange(inicio,fim);
  var F=agg.funis;
  var T=F.TOPO,M=F.MEIO,MSG=F.FUNDO_MSG,VEN=F.FUNDO_VEN;
  function sum(arr,k){return arr.reduce(function(s,x){return s+(x[k]||0);},0);}
  var Ts=sum(T,'spend'),Ms=sum(M,'spend'),MSGs=sum(MSG,'spend'),VENs=sum(VEN,'spend');
  var totalSpend=Ts+Ms+MSGs+VENs;
  var reach=sum(T,'reach')+sum(M,'reach')+sum(MSG,'reach')+sum(VEN,'reach');
  var impr=sum(T,'impr')+sum(M,'impr')+sum(MSG,'impr')+sum(VEN,'impr');
  var conversas=sum(MSG,'results');
  var compras=sum(VEN,'compras')||sum(VEN,'results');
  var receita=sum(VEN,'receita');
  var roas=VENs>0?receita/VENs:0;

  // Insight
  var hlR=VENs>0?'<span class="ins-hl">'+fmtBRL(receita,0)+'</span>':'';
  var hlROAS=VENs>0?'<span class="ins-hl">'+roas.toFixed(2).replace('.',',')+'x</span>':'';
  var hlC=MSGs>0?'<span class="ins-hl">'+fmtNum(conversas)+' conversas</span>':'';
  var partes=[];
  if(hlR)partes.push(hlR+' de receita (ROAS '+hlROAS+')');
  if(hlC)partes.push(hlC);
  var insTxt='Período com <span class="ins-hl">'+fmtBRL(totalSpend,0)+'</span> investidos'+(partes.length?' gerando '+partes.join(' e '):'.')+'.';
  document.getElementById('d-ins-txt').innerHTML=insTxt;
  document.getElementById('d-ins-stats').innerHTML=[
    ['Receita Atribuída',fmtBRL(receita,0)],
    ['ROAS (Vendas)',roas.toFixed(2).replace('.',',')+'x'],
    ['Conversas MSG',fmtNum(conversas)]
  ].map(function(s){return '<div><div class="is-label">'+s[0]+'</div><div class="is-val">'+s[1]+'</div></div>';}).join('');

  // KPIs
  var gkpis=[
    {label:'Investido total',value:fmtBRL(totalSpend,0),color:'var(--t)',sub:diffDays(inicio,fim)+1+' dias'},
    {label:'Receita',value:fmtBRL(receita,0),color:'var(--grn)',sub:'ROAS '+roas.toFixed(2).replace('.',',')+'x'},
    {label:'Compras',value:fmtNum(compras),color:'var(--blue)',sub:'no período'},
    {label:'Conversas',value:fmtNum(conversas),color:'var(--pur)',sub:'WhatsApp'}
  ];
  gkpis.forEach(function(k,i){
    document.getElementById('kl'+i).textContent=k.label;
    var v=document.getElementById('kv'+i);v.textContent=k.value;v.style.color=k.color;
    document.getElementById('ks'+i).textContent=k.sub;
  });

  // GCards
  var gcards=[];
  if(Ts>0){
    var cpm=impr>0?Ts/sum(T,'impr')*1000:0;
    gcards.push({color:'#E08C00',icon:'🎯',label:'Topo — Awareness',camps:T.length+' camp.',invest:fmtBRL(Ts,0),m:fmtNum(sum(T,'reach')),ml:'Alcance',cpr:fmtBRL(cpm),cprl:'CPM',pct:fmtPct(Ts/totalSpend),s1:fmtNum(sum(T,'impr')),s1l:'Impressões',s2:fmtNum(sum(T,'results')),s2l:'Resultados'});
  }
  if(Ms>0){
    var cpv=sum(M,'results')>0?Ms/sum(M,'results'):0;
    gcards.push({color:'#0077A8',icon:'🌐',label:'Meio — Tráfego',camps:M.length+' camp.',invest:fmtBRL(Ms,0),m:fmtNum(sum(M,'results')),ml:'Visitas',cpr:fmtBRL(cpv),cprl:'C/Visita',pct:fmtPct(Ms/totalSpend),s1:fmtNum(sum(M,'impr')),s1l:'Impressões',s2:fmtNum(sum(M,'reach')),s2l:'Alcance'});
  }
  if(MSGs>0){
    var cprMSG=conversas>0?MSGs/conversas:0;
    var bestCpr=MSG.length?Math.min.apply(null,MSG.filter(function(x){return x.results>0;}).map(function(x){return x.spend/x.results;})):0;
    gcards.push({color:'#7B2FBE',icon:'💬',label:'Fundo — MSG',camps:MSG.length+' camp.',invest:fmtBRL(MSGs,0),m:fmtNum(conversas),ml:'Conversas',cpr:fmtBRL(cprMSG),cprl:'C/Conversa',pct:fmtPct(MSGs/totalSpend),s1:fmtNum(conversas),s1l:'Novos',s2:fmtBRL(bestCpr||0),s2l:'Melhor CPR'});
  }
  if(VENs>0){
    var cpa=compras>0?VENs/compras:0;
    gcards.push({color:'#1877F2',icon:'🛒',label:'Fundo — Vendas',camps:VEN.length+' camp.',invest:fmtBRL(VENs,0),m:fmtNum(compras),ml:'Compras',cpr:fmtBRL(cpa),cprl:'C/Venda',pct:fmtPct(VENs/totalSpend),s1:roas.toFixed(2).replace('.',',')+'x',s1l:'ROAS',s2:fmtBRL(receita,0),s2l:'Receita'});
  }
  document.getElementById('gcV').innerHTML=gcards.map(function(c){
    return '<div class="gc-card" style="border-color:'+c.color+'33">'
      +'<div class="gc-bar" style="background:'+c.color+'"></div>'
      +'<div class="gc-head"><div class="gc-title" style="color:'+c.color+'">'+c.icon+' '+c.label
        +'<span style="font-size:8px;font-weight:400;color:var(--t3);margin-left:6px;font-family:\'IBM Plex Mono\',monospace">'+c.camps+'</span>'
      +'</div><span class="gc-invest">'+c.invest+'</span></div>'
      +'<div class="gc-main"><div><div class="gc-num" style="color:'+c.color+'">'+c.m+'</div><div class="gc-num-l">'+c.ml+'</div></div>'
      +'<div><div class="gc-cpr">'+c.cpr+'</div><div class="gc-cpr-l">'+c.cprl+'</div></div></div>'
      +'<div class="gc-row"><div><div class="gc-sv">'+c.pct+'</div><div class="gc-sl">do invest.</div></div>'
      +'<div><div class="gc-sv">'+c.s1+'</div><div class="gc-sl">'+c.s1l+'</div></div>'
      +'<div><div class="gc-sv">'+c.s2+'</div><div class="gc-sl">'+c.s2l+'</div></div></div>'
    +'</div>';
  }).join('');

  // Pie
  var pieData=[VENs,MSGs,Ms,Ts];
  var pieLabels=['Fundo VEN','Fundo MSG','Meio','Topo'];
  var pieCores=['#1877F2','#7B2FBE','#0077A8','#E08C00'];
  var pieVals=pieData.map(function(v){return fmtBRL(v,2);});
  var piePcts=pieData.map(function(v){return totalSpend>0?fmtPct(v/totalSpend):'0%';});
  if(_pieChart)_pieChart.destroy();
  _pieChart=new Chart(document.getElementById('cPie'),{
    type:'doughnut',
    data:{labels:pieLabels,datasets:[{data:pieData,backgroundColor:pieCores,borderWidth:0,spacing:3}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{display:false},tooltip:Object.assign({},TT,{callbacks:{label:function(ctx){return ctx.label+': R$ '+ctx.parsed.toLocaleString('pt-BR',{minimumFractionDigits:2});}}})}}
  });
  document.getElementById('pieSub').textContent='Por estágio do funil · '+fmtBRL(totalSpend,2)+' total';
  document.getElementById('pieLg').innerHTML=pieLabels.map(function(l,i){
    if(!pieData[i])return'';
    return '<div><div style="display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:3px">'
      +'<span style="width:7px;height:7px;border-radius:50%;background:'+pieCores[i]+'"></span>'
      +'<span class="pl-lbl">'+l+'</span></div>'
      +'<div class="pl-v" style="color:'+pieCores[i]+'">'+pieVals[i]+'</div>'
      +'<div class="pl-p">'+piePcts[i]+'</div></div>';
  }).join('');

  // Aba Campanhas
  var seqs=[['FUNDO_VEN','ven','Fundo — Vendas','#1877F2'],['FUNDO_MSG','msg','Fundo — MSG','#7B2FBE'],['MEIO','meio','Meio — Tráfego','#0077A8'],['TOPO','topo','Topo — Awareness','#E08C00']];
  document.getElementById('tab-campanhas').innerHTML=seqs.map(function(sq){
    var cs=F[sq[0]];if(!cs||!cs.length)return'';
    var maxS=Math.max.apply(null,cs.map(function(c){return c.spend;}));
    var sorted=cs.slice().sort(function(a,b){return b.spend-a.spend;});
    return '<div class="cg-sect"><div class="cg-hdr"><span class="badge '+sq[1]+'">'+sq[1].toUpperCase()+'</span>'
      +'<span class="cg-stitle">'+sq[2]+'</span><span class="cg-sub">'+cs.length+' campanha'+(cs.length>1?'s':'')+'</span></div>'
      +sorted.map(function(c){
        var isVen=sq[0]==='FUNDO_VEN';
        var resultLbl=isVen?'Compras':(sq[0]==='FUNDO_MSG'?'Conversas':(sq[0]==='MEIO'?'Visitas':'Alcance'));
        var cprLbl=isVen?'C/Venda':(sq[0]==='FUNDO_MSG'?'C/Conversa':(sq[0]==='MEIO'?'C/Visita':'CPM'));
        var resultVal=isVen?fmtNum(c.compras||c.results):(sq[0]==='TOPO'?fmtNum(c.reach):fmtNum(c.results));
        var denom=isVen?(c.compras||c.results):(sq[0]==='TOPO'?(c.impr/1000):c.results);
        var cprVal=denom>0?fmtBRL(c.spend/denom):'—';
        var roasVal=isVen&&c.spend>0?(c.receita/c.spend).toFixed(2).replace('.',',')+'x':'';
        return '<div class="cr"><div class="cr-name">'+c.name+'</div>'
          +'<div class="cr-bar"><div class="cr-fill" style="width:'+Math.round(c.spend/maxS*100)+'%;background:'+sq[3]+'"></div></div>'
          +'<div class="cr-stats"><div><div class="cs-lbl">'+resultLbl+'</div><div class="cs-v" style="color:'+sq[3]+'">'+resultVal+'</div></div>'
          +'<div><div class="cs-lbl">'+cprLbl+'</div><div class="cs-v" style="color:var(--ylw)">'+cprVal+'</div></div>'
          +(roasVal?'<div><div class="cs-lbl">ROAS</div><div class="cs-v" style="color:var(--grn)">'+roasVal+'</div></div>':'<div></div>')
          +'</div></div>';
      }).join('')+'</div>';
  }).join('')||'<p style="color:var(--t4);padding:14px;font-size:12px">Sem dados neste período.</p>';

  // Aba Por Dia
  if(agg.daily.length){
    var mx=Math.max.apply(null,agg.daily.map(function(r){return r.invest;}))||1;
    var _tp=_D.meta.tipo||'mixed';
    document.getElementById('tab-dia').innerHTML=agg.daily.map(function(r){
      var _cpl=r.conversas>0?'R$ '+(r.invest/r.conversas).toLocaleString('pt-BR',{minimumFractionDigits:2}):'—';
      return '<div class="dr"><div class="dr-date">'+r.label+'</div>'
        +'<div class="dr-bar"><div class="dr-fill" style="width:'+(r.invest/mx*100).toFixed(1)+'%"></div></div>'
        +'<div class="dr-stats"'+(_tp==='msg'?' style="grid-template-columns:repeat(3,1fr)"':'')+' >'
        +'<div><div class="ds-lbl">Invest.</div><div class="ds-v">R$ '+r.invest.toLocaleString('pt-BR',{minimumFractionDigits:2})+'</div></div>'
        +'<div><div class="ds-lbl">Conv.</div><div class="ds-v" style="color:var(--pur)">'+r.conversas+'</div></div>'
        +(_tp==='msg'
          ?'<div><div class="ds-lbl">CPL</div><div class="ds-v" style="color:var(--ylw)">'+_cpl+'</div></div>'
          :'<div><div class="ds-lbl">Compras</div><div class="ds-v" style="color:var(--blue)">'+r.compras+'</div></div>'
          +'<div><div class="ds-lbl">Receita</div><div class="ds-v" style="color:var(--grn)">R$ '+r.receita.toLocaleString('pt-BR',{minimumFractionDigits:0})+'</div></div>'
        )
        +'</div></div>';
    }).join('');
  }else{document.getElementById('tab-dia').innerHTML='<p style="color:var(--t4);padding:14px;font-size:12px">Sem dados diários.</p>';}

  // Aba Funil
  (function(){
    var SC={b:'#1877F2',t:'#0077A8',y:'#E08C00',p:'#7B2FBE',g:'#00934a'};
    var SF={b:'#EAF1FF',t:'#E0F4FA',y:'#FFF6E0',p:'#F3EAFF',g:'#E6F5EE'};
    function st(ck,ic,nm,od,vl,rt,rl){
      return '<div class="fn-s" style="border-left:3px solid '+SC[ck]+'">'
        +'<div style="width:26px;height:26px;border-radius:7px;background:'+SF[ck]+';display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0">'+ic+'</div>'
        +'<div style="flex:1;min-width:0"><div class="fn-sn">'+nm+'</div><div class="fn-so">'+od+'</div></div>'
        +'<div class="fn-sv" style="color:'+SC[ck]+'">'+vl+'</div>'
        +'<div class="fn-rate"><div class="fn-rv">'+rt+'</div><div class="fn-rl">'+rl+'</div></div>'
      +'</div>';
    }
    function p(a,b){return b>0?Math.round(a/b*100):0;}
    var _tp=_D.meta.tipo||'mixed';
    var _fhtml='';
    if(_tp!=='msg'){
      var vReach=sum(VEN,'reach'),vImpr=sum(VEN,'impr');
      _fhtml+='<div class="fn"><div class="fn-hdr"><div class="fn-icon" style="background:#EAF1FF;color:#1877F2">🛒</div>'
        +'<div><div class="fn-title">Funil — Vendas (VEN)</div><div class="fn-sub">Do alcance à compra</div></div></div>'
        +st('b','📣','Alcance','Pessoas impactadas',fmtNum(vReach),'—','entrada')
        +st('t','👁️','Impressões','Exibições totais',fmtNum(vImpr),p(vImpr,vReach)+'%','freq')
        +st('g','✅','Compras','Conversão final',fmtNum(compras),vReach>0?p(compras,vReach)+'%':'—','de alcance')
        +(receita>0?'<div class="fn-ins">Receita <span class="fi-hl">'+fmtBRL(receita,0)+'</span> (ROAS '+roas.toFixed(2).replace('.',',')+'x)</div>':'')
        +'</div>';
    }
    if(_tp!=='ven'){
      var mReach=sum(MSG,'reach'),mImpr=sum(MSG,'impr');
      _fhtml+='<div class="fn"><div class="fn-hdr"><div class="fn-icon" style="background:#F3EAFF;color:#7B2FBE">💬</div>'
        +'<div><div class="fn-title">Funil — Mensagens (MSG)</div><div class="fn-sub">Do alcance à conversa</div></div></div>'
        +st('p','📣','Alcance','Pessoas impactadas',fmtNum(mReach),'—','entrada')
        +st('t','👁️','Impressões','Exibições totais',fmtNum(mImpr),p(mImpr,mReach)+'%','freq')
        +st('g','💬','Conversas','Engajamento',fmtNum(conversas),mReach>0?p(conversas,mReach)+'%':'—','de alcance')
        +(conversas>0?'<div class="fn-ins">Custo médio por conversa: <span class="fi-hl">'+fmtBRL(MSGs/conversas)+'</span></div>':'')
        +'</div>';
    }
    document.getElementById('tab-funil').innerHTML=_fhtml||'<p style="color:var(--t4);padding:14px;font-size:12px">Sem dados de funil neste período.</p>';
  })();

  // Relatório escrito — pega o mais recente dentro do range
  var relKey=null;
  Object.keys(_D.relatorios||{}).sort().reverse().some(function(k){
    if(k>=inicio&&k<=fim){relKey=k;return true;}
    return false;
  });
  document.getElementById('repCli').textContent=_D.meta.cliente;
  document.getElementById('repInfo').textContent=label+' · Conta '+_D.meta.conta+' · Gestor: '+_D.meta.gestor+' · Atualizado em '+_D.meta.updated;
  if(relKey){
    document.getElementById('repContent').innerHTML=_D.relatorios[relKey];
  }else{
    document.getElementById('repContent').innerHTML='<p style="color:var(--t4);padding:14px 0">Sem relatório escrito para este período. Os relatórios são gerados por semana fechada.</p>';
  }
}

// ─── Calendário / Range Picker ────────────────────────
(function initCalendar(){
  var monthLeft=null;

  function drawPresets(){
    var html=PRESETS.map(function(p){
      var isOn=_tempRange&&_tempRange.preset===p.key;
      return '<button class="cal-preset'+(isOn?' on':'')+'" data-p="'+p.key+'">'+p.label+'</button>';
    }).join('');
    document.getElementById('calPresets').innerHTML=html;
    document.getElementById('calPresets').querySelectorAll('.cal-preset').forEach(function(btn){
      btn.addEventListener('click',function(e){
        e.stopPropagation();
        var key=btn.dataset.p;
        if(key==='custom'){
          _tempRange={inicio:_tempRange.inicio,fim:_tempRange.fim,preset:'custom'};
          _tempClickStart=null;
        } else {
          var r=applyPreset(key);
          if(r){_tempRange=r;_tempClickStart=null;monthLeft=new Date(fromIso(_tempRange.fim).getFullYear(),fromIso(_tempRange.fim).getMonth()-1,1);}
        }
        drawAll();
      });
    });
  }

  function drawMonth(gridId,monthDate){
    var y=monthDate.getFullYear(),m=monthDate.getMonth();
    var first=new Date(y,m,1);
    var firstDow=(first.getDay()+6)%7;
    var daysInMonth=new Date(y,m+1,0).getDate();
    var prevMonthDays=new Date(y,m,0).getDate();
    var html='';
    DOW.forEach(function(d){html+='<div class="cal-dow">'+d+'</div>';});
    for(var i=firstDow-1;i>=0;i--)html+='<div class="cal-day other-month">'+(prevMonthDays-i)+'</div>';
    for(var dd=1;dd<=daysInMonth;dd++){
      var isoD=y+'-'+String(m+1).padStart(2,'0')+'-'+String(dd).padStart(2,'0');
      var hasD=_dataMap[isoD];
      var cls='cal-day';
      if(hasD)cls+=' has-data';
      else cls+=' no-data';
      if(_tempRange&&isoD>=_tempRange.inicio&&isoD<=_tempRange.fim){
        cls+=' in-range';
        if(isoD===_tempRange.inicio)cls+=' range-start';
        if(isoD===_tempRange.fim)cls+=' range-end';
      }
      html+='<div class="'+cls+'" data-d="'+isoD+'">'+dd+'</div>';
    }
    var total=firstDow+daysInMonth;
    var rest=(7-(total%7))%7;
    for(var j=1;j<=rest;j++)html+='<div class="cal-day other-month">'+j+'</div>';
    var grid=document.getElementById(gridId);
    grid.innerHTML=html;
    grid.querySelectorAll('.cal-day.has-data').forEach(function(el){
      el.addEventListener('click',function(e){
        e.stopPropagation();
        var d=el.dataset.d;
        if(_tempClickStart===null){
          _tempClickStart=d;
          _tempRange={inicio:d,fim:d,preset:'custom'};
        } else {
          if(d<_tempClickStart){_tempRange={inicio:d,fim:_tempClickStart,preset:'custom'};}
          else{_tempRange={inicio:_tempClickStart,fim:d,preset:'custom'};}
          _tempClickStart=null;
        }
        drawAll();
      });
    });
  }

  function drawNav(){
    if(!monthLeft)monthLeft=new Date(fromIso(_maxDate||iso(new Date())).getFullYear(),fromIso(_maxDate||iso(new Date())).getMonth()-1,1);
    var right=new Date(monthLeft.getFullYear(),monthLeft.getMonth()+1,1);
    document.getElementById('calMonthLeft').textContent=MES[monthLeft.getMonth()]+' '+monthLeft.getFullYear();
    document.getElementById('calMonthRight').textContent=MES[right.getMonth()]+' '+right.getFullYear();
    drawMonth('calGridLeft',monthLeft);
    drawMonth('calGridRight',right);
  }

  function drawHdr(){
    if(!_tempRange){document.getElementById('calRangeLabel').textContent='—';return;}
    var lbl=labelRange(_tempRange.inicio,_tempRange.fim);
    var preset=PRESETS.find(function(p){return p.key===_tempRange.preset;});
    document.getElementById('calRangeLabel').textContent=lbl+(preset&&preset.key!=='custom'?' ('+preset.label+')':'');
  }

  function drawAll(){drawPresets();drawNav();drawHdr();}

  document.getElementById('btnCal').addEventListener('click',function(e){
    e.stopPropagation();
    var menu=document.getElementById('calMenu');
    if(!menu.classList.contains('on')){
      _tempRange=_currentRange?{inicio:_currentRange.inicio,fim:_currentRange.fim,preset:_currentRange.preset}:applyPreset('last_7d');
      _tempClickStart=null;
      monthLeft=new Date(fromIso(_tempRange.fim).getFullYear(),fromIso(_tempRange.fim).getMonth()-1,1);
      drawAll();
    }
    menu.classList.toggle('on');
  });
  document.getElementById('calPrev').addEventListener('click',function(e){e.stopPropagation();monthLeft=new Date(monthLeft.getFullYear(),monthLeft.getMonth()-1,1);drawAll();});
  document.getElementById('calNext').addEventListener('click',function(e){e.stopPropagation();monthLeft=new Date(monthLeft.getFullYear(),monthLeft.getMonth()+1,1);drawAll();});
  document.getElementById('calClose').addEventListener('click',function(e){e.stopPropagation();document.getElementById('calMenu').classList.remove('on');});
  document.getElementById('calCancel').addEventListener('click',function(e){e.stopPropagation();document.getElementById('calMenu').classList.remove('on');});
  document.getElementById('calApply').addEventListener('click',function(e){
    e.stopPropagation();
    if(_tempRange){renderRange(_tempRange.inicio,_tempRange.fim);}
    document.getElementById('calMenu').classList.remove('on');
  });
})();

function _wa(){window.open('https://wa.me/?text='+encodeURIComponent(_st()+'\n'+_sl()));}

function _share(menu){
  if(navigator.share){navigator.share({title:_st(),url:_sl()}).catch(function(){});}
  else{menu.classList.toggle('on');}
}

document.getElementById('shareWA').addEventListener('click',_wa);
document.getElementById('shareEmail').addEventListener('click',_email);

document.getElementById('shareEmailRep').addEventListener('click',_email);
</script>
